name: CI/CD

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install deps
      - name: Install dependencies
        run: npm ci

      # 4. Build project
      - name: Build
        run: npm run build

      # 5. Upload dist to VPS (temporary)
      - name: Upload dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist/*"
          target: "/home/thiyagu/kitsune-labs-temp"

      # 6. Move to production (atomic deploy)
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Remove old dist
            rm -rf /home/thiyagu/kitsune-labs/dist

            # Move new build
            mv /home/thiyagu/kitsune-labs-temp/dist /home/thiyagu/kitsune-labs/

            # Cleanup temp
            rm -rf /home/thiyagu/kitsune-labs-temp

            # Reload nginx
            sudo systemctl reload nginx